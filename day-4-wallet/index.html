<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 4 - Connect a Browser Wallet</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(720px, 92vw);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      .muted {
        color: #94a3b8;
        margin: 0 0 16px;
      }

      #status {
        margin-bottom: 12px;
        color: #cbd5e1;
      }

      #wallet-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .wallet-btn {
        background: #1d4ed8;
        color: #fff;
        border: none;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .wallet-btn:hover {
        background: #2563eb;
      }

      .wallet-icon {
        width: 20px;
        height: 20px;
        border-radius: 4px;
      }

      #connected {
        display: none;
        margin-top: 12px;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 14px;
        background: #0b1220;
      }

      .field {
        margin: 8px 0;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        word-break: break-all;
      }

      #disconnectBtn {
        margin-top: 12px;
        background: #475569;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      #error {
        color: #fda4af;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Connect a Solana Browser Wallet</h1>
      <p class="muted">Choose a wallet extension and connect on devnet.</p>

      <div id="status"></div>
      <div id="wallet-list"></div>
      <section id="connected"></section>
      <div id="error"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
